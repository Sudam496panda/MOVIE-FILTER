 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Filter System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.sidebar {
    width: 260px;
    background: white;
    padding: 15px;
    border-right: 1px solid #ddd;
}

.content {
    flex: 1;
    padding: 20px;
}

.movie {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
}

input {
    width: 90%;
    padding: 6px;
    margin: 5px 0;
}

button {
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

    <h3>🎬 Filters</h3>

    <h4>Genre</h4>
    <label><input type="checkbox" value="1"> Action</label><br>
    <label><input type="checkbox" value="2"> Comedy</label><br>
    <label><input type="checkbox" value="3"> Drama</label><br>
    <label><input type="checkbox" value="4"> Horror</label><br>

    <h4>Language</h4>
    <label><input type="checkbox" value="1"> English</label><br>
    <label><input type="checkbox" value="2"> Hindi</label><br>
    <label><input type="checkbox" value="3"> Odia</label><br>

    <button onclick="loadMovies()">Apply Filter</button>

    <hr>

    <h3>➕ Add Movie</h3>

    <input type="text" id="title" placeholder="Movie Title">
    <input type="number" id="rating" placeholder="Rating">
    <input type="number" id="year" placeholder="Release Year">

    <button onclick="addMovie()">Add Movie</button>

</div>

<!-- CONTENT -->
<div class="content">

    <h2>Movies List</h2>
    <div id="movies"></div>

    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>

</div>

</div>

<script>

let page = 1;

// ------------------------
// LOAD MOVIES
// ------------------------
function loadMovies() {

    let genres = [];
    let languages = [];

    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
        if (cb.checked) {
            if (["1","2","3","4"].includes(cb.value)) {
                genres.push(cb.value);
            } else {
                languages.push(cb.value);
            }
        }
    });

    let url = "http://127.0.0.1:5000/movies?page=" + page;

    genres.forEach(g => url += "&genre=" + g);
    languages.forEach(l => url += "&language=" + l);

    fetch(url)
    .then(res => res.json())
    .then(data => {

        let container = document.getElementById("movies");
        container.innerHTML = "";

        if (!data || data.length === 0) {
            container.innerHTML = "<p>No movies found</p>";
            return;
        }

        data.forEach(movie => {
            let div = document.createElement("div");
            div.className = "movie";

            div.innerHTML = `
                <b>${movie.title}</b><br>
                ⭐ Rating: ${movie.rating}<br>
                📅 Year: ${movie.release_year}<br>
                🆔 ID: ${movie.id}<br><br>

                <button onclick="deleteMovie(${movie.id})">Delete</button>
            `;

            container.appendChild(div);
        });
    })
    .catch(err => {
        console.log(err);
        alert("Backend not responding");
    });
}


// ------------------------
// ADD MOVIE
// ------------------------
function addMovie() {

    let title = document.getElementById("title").value;
    let rating = parseFloat(document.getElementById("rating").value);
    let year = parseInt(document.getElementById("year").value);

    if (!title || !rating || !year) {
        alert("Please fill all fields");
        return;
    }

    fetch("http://127.0.0.1:5000/movies", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: title,
            genre: "Action",
            language: "English",
            rating: rating,
            release_year: year
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        if (data.error) {
            alert("Error: " + data.error);
        } else {
            alert("Movie Added ✔");

            document.getElementById("title").value = "";
            document.getElementById("rating").value = "";
            document.getElementById("year").value = "";

            loadMovies();
        }
    })
    .catch(err => {
        console.log(err);
        alert("Backend not responding");
    });
}


// ------------------------
// DELETE MOVIE
// ------------------------
function deleteMovie(id) {

    fetch(`http://127.0.0.1:5000/movies/${id}`, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(data => {
        alert("Movie Deleted ✔");
        loadMovies();
    })
    .catch(err => {
        console.log(err);
        alert("Delete failed");
    });
}


// ------------------------
function nextPage() {
    page++;
    loadMovies();
}

function prevPage() {
    if (page > 1) {
        page--;
        loadMovies();
    }
}

// INIT
loadMovies();

</script>

</body>
</html>
